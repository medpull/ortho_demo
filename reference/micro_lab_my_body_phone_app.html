<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Micro-Lab · My Body</title>
<style>
:root{
 --ink:#0f1830; --muted:#6b7793; --line:#eef1f7; --card:#ffffff; --bg1:#eaeefb; --bg2:#e3e9f6;
 --heart:#ff4d6d; --heart2:#ff8fa3; --move:#ff5a3c; --move2:#ff8a5b; --exer:#1fd17a; --exer2:#9bf06a;
 --stand:#00bcd4; --sleep:#6c5ce7; --sleep2:#a29bfe; --stress:#ff9f1c; --stress2:#ffd166;
 --oxy:#2f80ed; --oxy2:#56ccf2; --recov:#00b894; --soft:#f5f7fc;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);
 background:radial-gradient(1200px 700px at 20% -10%,#f4f1ff 0%,transparent 60%),
            radial-gradient(1000px 700px at 110% 10%,#e6fbff 0%,transparent 55%),
            linear-gradient(160deg,var(--bg1),var(--bg2));
 display:flex; align-items:center; justify-content:center; min-height:100vh; padding:26px 12px;}
.pagehint{position:fixed; left:0; right:0; top:14px; text-align:center; color:#8893ad; font-size:12px; font-weight:700; letter-spacing:.02em;}
/* ===== phone device ===== */
.device{position:relative; width:392px; height:850px; background:#0b1020; border-radius:56px;
 padding:13px; box-shadow:0 50px 90px -28px rgba(22,28,60,.55), 0 0 0 2px rgba(255,255,255,.04) inset, 0 8px 30px rgba(0,0,0,.35);}
.screenframe{position:relative; width:100%; height:100%; background:var(--soft); border-radius:44px; overflow:hidden; display:flex; flex-direction:column;}
.island{position:absolute; top:14px; left:50%; transform:translateX(-50%); width:118px; height:30px; background:#05070f; border-radius:18px; z-index:40;}
.statusbar{height:50px; flex:0 0 50px; display:flex; align-items:center; justify-content:space-between; padding:0 26px 0 28px; font-size:14px; font-weight:800; color:var(--ink); z-index:30;}
.statusbar .r{display:flex; align-items:center; gap:7px;}
.statusbar svg{display:block}
/* app bar */
.appbar{flex:0 0 auto; background:linear-gradient(180deg,rgba(245,247,252,.96),rgba(245,247,252,.82)); backdrop-filter:saturate(1.3) blur(8px);
 padding:4px 16px 10px; z-index:25; border-bottom:1px solid rgba(15,24,48,.04);}
.greet{display:flex; align-items:center; gap:11px;}
.avatar{width:42px; height:42px; border-radius:50%; flex:0 0 42px; background:linear-gradient(135deg,#7c9cff,#6c5ce7); color:#fff; font-weight:900; display:flex; align-items:center; justify-content:center; font-size:15px; box-shadow:0 6px 16px rgba(108,92,231,.35);}
.greet h1{margin:0; font-size:18px; letter-spacing:-.02em;}
.greet p{margin:1px 0 0; color:var(--muted); font-size:12px; font-weight:600;}
.bell{margin-left:auto; width:38px; height:38px; border-radius:13px; background:#fff; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; position:relative;}
.bell::after{content:""; position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%; background:var(--heart); border:2px solid #fff;}
.tierrow{display:flex; align-items:center; gap:8px; margin-top:11px;}
.segment{display:flex; background:#e9edf6; border-radius:13px; padding:3px; flex:1;}
.segment button{flex:1; border:0; background:transparent; padding:8px 4px; border-radius:10px; font-weight:800; font-size:12px; color:var(--muted); cursor:pointer; transition:.18s; letter-spacing:-.01em;}
.segment button.on{background:#fff; color:var(--ink); box-shadow:0 3px 10px rgba(20,30,60,.12);}
.demochip{font-size:10px; font-weight:800; color:#8a93a8; background:#fff; border:1px solid var(--line); padding:6px 9px; border-radius:10px; white-space:nowrap;}
/* screens */
.screens{position:relative; flex:1 1 auto; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:14px 14px 96px;}
.screens::-webkit-scrollbar{width:0}
.screen{display:none; animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
/* cards */
.card{background:var(--card); border-radius:22px; padding:16px; box-shadow:0 10px 26px rgba(20,30,60,.06); margin-bottom:13px; border:1px solid rgba(15,24,48,.03);}
.card.tight{padding:13px}
.card h2{margin:0 0 2px; font-size:15px; letter-spacing:-.01em;}
.card .sub{color:var(--muted); font-size:11.5px; font-weight:600; margin:0 0 11px;}
.row{display:flex; align-items:center; gap:12px;}
.between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px;}
.sec-title{display:flex; align-items:center; justify-content:space-between; margin:4px 2px 9px;}
.sec-title h3{margin:0; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:#8a93a8;}
.sec-title a{font-size:12px; color:var(--oxy); font-weight:800; text-decoration:none;}
.pill{display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:800; padding:4px 8px; border-radius:999px;}
.pill.good{background:#e6f8ef; color:#0a9d57;} .pill.warn{background:#fff3e0; color:#e07b00;} .pill.info{background:#e8f1ff; color:#2f6fed;}
.pill.prem{background:#efeaff; color:#6c5ce7;} .pill.clin{background:#e7f6f9; color:#0093a8;}
.badge-tier{font-size:9.5px; font-weight:900; letter-spacing:.04em; padding:3px 7px; border-radius:7px; text-transform:uppercase;}
.badge-tier.prem{background:#efeaff; color:#6c5ce7;} .badge-tier.clin{background:#e7f6f9; color:#0093a8;}
/* metric mini card */
.metric{background:#fff; border:1px solid var(--line); border-radius:18px; padding:12px;}
.metric .top{display:flex; align-items:center; gap:7px; color:var(--muted); font-size:11px; font-weight:800;}
.metric .ico{width:24px; height:24px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.metric .val{font-size:23px; font-weight:900; letter-spacing:-.03em; margin:6px 0 0; line-height:1;}
.metric .val small{font-size:12px; font-weight:800; color:var(--muted); margin-left:2px;}
.metric .delta{font-size:10.5px; font-weight:800; margin-top:3px; display:flex; align-items:center; gap:3px;}
.delta.up{color:#0a9d57} .delta.down{color:var(--heart)} .delta.flat{color:var(--muted)}
.bignum{font-size:44px; font-weight:900; letter-spacing:-.04em; line-height:.9;}
.unit{font-size:14px; font-weight:800; color:var(--muted);}
.story{display:flex; gap:11px; align-items:flex-start;}
.story .dot{width:34px; height:34px; border-radius:11px; flex:0 0 34px; display:flex; align-items:center; justify-content:center;}
.story p{margin:0; font-size:13px; line-height:1.5; color:#39435c;}
.kv{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px;}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted); font-weight:600} .kv .v{font-weight:800}
.legendrow{display:flex; flex-wrap:wrap; gap:10px 14px; margin-top:10px;}
.legendrow span{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#4b5570;}
.legendrow i{width:10px; height:10px; border-radius:3px; display:inline-block;}
.fig{width:100%; display:block; border-radius:14px; overflow:hidden; background:#fff;}
.clin-fig{border:1px solid var(--line); border-radius:14px; overflow:hidden;}
/* tabbar */
.tabbar{position:absolute; left:13px; right:13px; bottom:13px; height:74px; background:rgba(255,255,255,.86); backdrop-filter:saturate(1.4) blur(16px);
 border-radius:26px; display:flex; align-items:center; justify-content:space-around; padding:0 6px 8px; box-shadow:0 14px 34px rgba(20,30,60,.16); border:1px solid rgba(255,255,255,.6); z-index:35;}
.tab{flex:1; border:0; background:transparent; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 0; color:#9aa3b8; cursor:pointer; font-size:10px; font-weight:800;}
.tab svg{width:23px; height:23px}
.tab.on{color:var(--ink);}
.tab.on .ti{transform:translateY(-1px)}
.fab{position:absolute; right:22px; bottom:98px; width:54px; height:54px; border-radius:18px; border:0; z-index:36; color:#fff;
 background:linear-gradient(135deg,var(--heart),#ff7a59); box-shadow:0 14px 28px rgba(255,77,109,.45); font-size:24px; font-weight:300; display:flex; align-items:center; justify-content:center;}
.gate{display:none!important}
body.tier-2 .gate.t2, body.tier-3 .gate.t2, body.tier-3 .gate.t3{display:block!important}
body.tier-2 .t1only, body.tier-3 .t1only{display:none!important}
.tierhint{font-size:11px; color:#8a93a8; font-weight:700; text-align:center; padding:6px 0 2px;}
.scorewrap{display:flex; align-items:center; gap:14px;}
.scoremeta{flex:1}
.scoremeta .lbl{font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.scoremeta .st{font-size:20px; font-weight:900; letter-spacing:-.02em; margin:3px 0 6px;}
.mini-bars{display:flex; gap:5px; align-items:flex-end; height:34px;}
.mini-bars i{flex:1; background:var(--line); border-radius:4px; min-height:5px;}
@media(max-width:430px){
 body{padding:0; align-items:stretch}
 .pagehint{display:none}
 .device{width:100vw; height:100vh; min-height:100dvh; border-radius:0; padding:0;}
 .screenframe{border-radius:0}
 .island{top:9px}
}

/* ===== Reports / profiles / cascades ===== */
.kicker{color:#2f80ed;font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
.hero-reports{background:linear-gradient(135deg,#ffffff,#f3f7ff)}
.profile-tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.profile-tile{margin-bottom:0;padding:14px;cursor:pointer;transition:.15s}
.profile-tile:active{transform:scale(.98)}
.ptile-name{font-size:13px;font-weight:800;letter-spacing:-.01em;line-height:1.22}
.ptile-meta{color:#8a93a8;font-size:10.5px;font-weight:600;margin-top:5px}
.ptile-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;font-weight:800;color:#2f80ed}
.chev{font-size:18px;color:#c0c8d8}
.backbtn{border:0;background:transparent;color:#2f80ed;font-weight:800;font-size:13px;padding:2px 0 8px;cursor:pointer}
.rc-tier{font-size:10px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#8a93a8}
.report-out{display:flex;gap:9px;align-items:flex-start;background:#f5f8ff;border-radius:14px;padding:11px;margin:10px 0}
.report-out .ro-ic{color:#2f80ed;font-size:10px;margin-top:3px}
.report-out p{margin:0;font-size:13px;line-height:1.5;font-weight:600;color:#2a3550}
.report-figs{display:flex;flex-direction:column;gap:10px;margin:4px 0 10px}
.report-figs .fig{border:1px solid var(--line)}
.rc-chips{font-size:11px;color:#6b7793;margin-top:4px;line-height:2}
.rc-chips strong,.rc-methods strong,.rc-anchors strong{color:#39435c;font-weight:800}
.chip-in{display:inline-block;background:#eef2fb;color:#4b5570;border-radius:8px;padding:3px 7px;font-size:10.5px;font-weight:700;margin:0 3px 3px 0}
.rc-methods,.rc-anchors{font-size:11px;color:#7c879e;line-height:1.5;margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
.gate-row{margin-top:10px;font-size:11.5px;font-weight:700;color:#e07b00;background:#fff7ec;border-radius:11px;padding:8px 10px}
.fam-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.fam-pill{font-size:10px;font-weight:700;color:#5b647d;background:#eef2fb;border-radius:8px;padding:4px 8px}
.gate-clin{background:linear-gradient(135deg,#f0fbfd,#ffffff)}
.exp-btn{margin-top:10px;width:100%;border:0;background:linear-gradient(135deg,#0093a8,#00bcd4);color:#fff;font-weight:800;padding:12px;border-radius:14px;font-size:13px;cursor:pointer}
.tab svg{width:22px;height:22px}

/* v2 reports: period, stats, kpis, edge */
.period-seg{display:inline-flex;background:#e9edf6;border-radius:11px;padding:3px;gap:2px}
.period-seg button{border:0;background:transparent;padding:7px 12px;border-radius:9px;font-weight:800;font-size:11.5px;color:#8a93a8;cursor:pointer}
.period-seg button.on{background:#fff;color:#0f1830;box-shadow:0 2px 8px rgba(20,30,60,.12)}
.edge-card{background:linear-gradient(135deg,#fbfcff,#eef4ff);border:1px solid #e2e9f7}
.edge-rep{margin:8px 0 10px;font-size:13px;line-height:1.5;font-weight:600;color:#2a3550}
.edge-win{font-size:12.5px;font-weight:800;color:#1f7a4d;background:#e9f9f0;border-radius:11px;padding:9px 11px}
.edge-line{font-size:11.5px;color:#55617d;line-height:1.5;margin-top:8px}
.edge-line strong{color:#39435c}
.edge-guard{font-size:11.5px;font-weight:700;color:#c0392b;background:#fdecea;border-radius:11px;padding:8px 10px;margin-top:8px}
.block-label{font-size:10px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;color:#9aa3b8;margin:13px 0 7px}
.viz-block{margin-bottom:12px}
.vhi{display:inline-block;font-size:10.5px;font-weight:800;color:#2f6fed;background:#eaf1ff;border-radius:8px;padding:4px 8px;margin-bottom:6px}
.vstat{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.vstat-i{font-size:10.5px;font-weight:700;color:#6b7793;background:#f3f6fc;border-radius:8px;padding:4px 8px}
.vstat-i b{color:#0f1830;font-weight:900}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.kpi{background:#f5f8ff;border:1px solid #e6edf9;border-radius:13px;padding:9px 6px;text-align:center}
.kpi-v{font-size:15px;font-weight:900;letter-spacing:-.02em;color:#0f1830}
.kpi-k{font-size:9px;font-weight:700;color:#8a93a8;margin-top:3px;line-height:1.1}
.statcards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.statcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px}
.sc-top{font-size:11px;font-weight:800;color:#6b7793}
.sc-val{font-size:22px;font-weight:900;letter-spacing:-.03em;margin:3px 0 6px}
.sc-dl{font-size:10px;font-weight:800;margin-left:5px}
.sc-dl.up{color:#0a9d57}.sc-dl.down{color:#ff4d6d}
.sc-cap{font-size:9.5px;font-weight:700;color:#9aa3b8;margin-top:4px}
.hdr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:11px}
.hdr-stats>div{background:#f5f8ff;border-radius:12px;padding:8px 4px;text-align:center}
.hdr-stats b{display:block;font-size:15px;font-weight:900;color:#0f1830}
.hdr-stats span{font-size:9px;font-weight:700;color:#8a93a8}
</style>
</head>

<script>
/* ============================ deterministic data ============================ */
let _uid=0; const uid=()=>'g'+(++_uid);
function rng(seed){let x=seed%2147483647; if(x<=0)x+=2147483646; return ()=>{x=(x*48271)%2147483647; return x/2147483647;};}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
const R=rng(20260628);
function series(n,base,amp,drift,sd){const a=[];for(let i=0;i<n;i++)a.push(base+Math.sin(i/2.1)*amp+drift*i+(R()-0.5)*sd);return a;}

const ME={
 readiness:82, sleepScore:86, activity:74,
 rhr:58, hrv:64, spo2:98, resp:14.2, temp:0.2, stress:34, vo2:46, weight:74.6, bp:'118/76',
 move:{cur:540,goal:600}, exer:{cur:38,goal:30}, stand:{cur:9,goal:12}, steps:9120, dist:6.8, floors:11, kcalTotal:2380,
 rhrWeek:[60,59,61,58,57,59,58], hrvWeek:[51,58,55,67,62,70,64],
 rhr14:series(14,58,3,-0.05,2.4), hrv14:series(14,60,7,0.4,5),
 vo2_12:series(12,44,1.2,0.18,0.8), weight12:series(12,75.4,0.3,-0.08,0.25),
 stepsWeek:[8200,10450,6700,12300,9100,4300,9120], sleepWeek:[7.1,6.4,7.8,7.2,8.0,6.9,7.7],

/* ============================ widget toolkit ============================ */
function grad(id,c0,c1,horiz){return `<linearGradient id="${id}" x1="0" y1="0" x2="${horiz?1:0}" y2="${horiz?0:1}"><stop offset="0" stop-color="${c0}"/><stop offset="1" stop-color="${c1}"/></linearGradient>`;}
function pol(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function arc(cx,cy,r,a0,a1){const [x0,y0]=pol(cx,cy,r,a0),[x1,y1]=pol(cx,cy,r,a1);const lg=(a1-a0)>180?1:0;return `M${x0.toFixed(2)} ${y0.toFixed(2)} A${r} ${r} 0 ${lg} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;}

function ringChart(items,centerTop,centerBig,centerSub){
 const cx=100,cy=100;let defs='',s='';
 items.forEach((it,i)=>{const r=84-i*21;const C=2*Math.PI*r;const id=uid();
  defs+=grad(id,it.c[0],it.c[1],true);
  s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef1f7" stroke-width="15"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="15" stroke-linecap="round" stroke-dasharray="${(Math.min(1,it.pct)*C).toFixed(1)} ${(C+4).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
 });
 let txt='';
 if(centerBig)txt=`<text x="100" y="98" text-anchor="middle" font-size="34" font-weight="900" fill="#0f1830" letter-spacing="-1">${esc(centerBig)}</text>`+
  (centerTop?`<text x="100" y="74" text-anchor="middle" font-size="12" font-weight="800" fill="#8a93a8">${esc(centerTop)}</text>`:'')+
  (centerSub?`<text x="100" y="118" text-anchor="middle" font-size="11" font-weight="800" fill="#8a93a8">${esc(centerSub)}</text>`:'');
 return `<svg class="fig" viewBox="0 0 200 200" style="height:178px"><defs>${defs}</defs>${s}${txt}</svg>`;
}

function gauge(score,label,statusTxt,c0,c1,max){
 max=max||100; const cx=100,cy=104,r=78; const a0=-135,a1=135, sweep=270;
 const id=uid(); const p=Math.max(0,Math.min(1,score/max));
 let s=`<defs>${grad(id,c0,c1,true)}</defs>`;
 s+=`<path d="${arc(cx,cy,r,a0,a1)}" fill="none" stroke="#eef1f7" stroke-width="15" stroke-linecap="round"/>`;
 s+=`<path d="${arc(cx,cy,r,a0,a0+sweep*p)}" fill="none" stroke="url(#${id})" stroke-width="15" stroke-linecap="round"/>`;
 const [hx,hy]=pol(cx,cy,r,a0+sweep*p);
 s+=`<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="7" fill="#fff" stroke="${c1}" stroke-width="3"/>`;
 s+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="42" font-weight="900" fill="#0f1830" letter-spacing="-2">${score}</text>`;
 if(label)s+=`<text x="${cx}" y="${cy+22}" text-anchor="middle" font-size="12" font-weight="800" fill="#8a93a8" letter-spacing=".5">${esc(label)}</text>`;
 if(statusTxt)s+=`<text x="${cx}" y="${cy+50}" text-anchor="middle" font-size="14" font-weight="900" fill="${c1}">${esc(statusTxt)}</text>`;
 return `<svg class="fig" viewBox="0 0 200 196" style="height:172px">${s}</svg>`;
}

function spark(data,w,h,c0,c1,opts){opts=opts||{};w=w||130;h=h||44;
 const mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),pad=(mx-mn)*0.2||1,lo=mn-pad,hi=mx+pad;
 const X=i=>3+i/(data.length-1)*(w-6),Y=v=>h-4-((v-lo)/(hi-lo))*(h-9);
 const id=uid(),id2=uid();
 let ln='';data.forEach((v,i)=>ln+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ');
 const area=`M${X(0).toFixed(1)} ${h} L`+data.map((v,i)=>X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' L')+` L${X(data.length-1).toFixed(1)} ${h} Z`;
 let base='';
 if(opts.baseline!=null){const by=Y(opts.baseline);base=`<line x1="3" y1="${by.toFixed(1)}" x2="${w-3}" y2="${by.toFixed(1)}" stroke="#cdd5e6" stroke-width="1" stroke-dasharray="3 3"/>`;}
 const last=data.length-1;
 return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><defs>${grad(id,c0,c1,true)}<linearGradient id="${id2}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c1}" stop-opacity=".26"/><stop offset="1" stop-color="${c1}" stop-opacity="0"/></linearGradient></defs>${base}<path d="${area}" fill="url(#${id2})"/><path d="${ln}" fill="none" stroke="url(#${id})" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${X(last).toFixed(1)}" cy="${Y(data[last]).toFixed(1)}" r="3.1" fill="#fff" stroke="${c1}" stroke-width="2"/></svg>`;
}

function barChart(data,labels,hi,c0,c1,unit){
 const w=320,h=130,pad=20,bw=(w-pad*2)/data.length;const mx=Math.max.apply(null,data)*1.18;
 const id=uid();let s=`<defs>${grad(id,c0,c1)}</defs>`;
 data.forEach((v,i)=>{const bh=(v/mx)*(h-34);const x=pad+i*bw+bw*0.18, y=h-22-bh, bwi=bw*0.64;
  const on=i===hi;
  s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bwi.toFixed(1)}" height="${bh.toFixed(1)}" rx="6" fill="${on?`url(#${id})`:'#e7ecf6'}"/>`;
  if(on)s+=`<text x="${(x+bwi/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="900" fill="#0f1830">${unit?(v>=1000?(v/1000).toFixed(1)+'k':v):v}</text>`;
  s+=`<text x="${(x+bwi/2).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="10" font-weight="800" fill="#9aa3b8">${esc(labels[i])}</text>`;
 });
 return `<svg class="fig" viewBox="0 0 ${w} ${h}" style="height:142px">${s}</svg>`;
}

function hypnogram(stages){

 const col={Awake:'#ff9aab',REM:'#7c9cff',Light:'#a99bff',Deep:'#5b4bd6'};
 const total=stages.reduce((a,b)=>a+b[1],0);const X=t=>L+t/total*(w-L-8);
 const yOf=st=>T+order.indexOf(st)*((h-T-B)/4)+((h-T-B)/8);
 let s='',t=0,prevY=null,prevXe=null;
 order.forEach((st,i)=>{const y=T+i*((h-T-B)/4);s+=`<text x="${L-8}" y="${(y+(h-T-B)/8+3).toFixed(1)}" text-anchor="end" font-size="9.5" font-weight="800" fill="#8a93a8">${st}</text>`;

 stages.forEach(([st,dur])=>{const x0=X(t),x1=X(t+dur),y=yOf(st);const c=col[st];
  if(prevY!=null)s+=`<line x1="${prevXe.toFixed(1)}" y1="${prevY.toFixed(1)}" x2="${prevXe.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#cdd5ea" stroke-width="2"/>`;

  prevY=y;prevXe=x1;t+=dur;});
 ['23:30','01:30','03:30','05:30','07:00'].forEach((tt,i)=>{const x=L+i/4*(w-L-8);s+=`<text x="${x.toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="9" font-weight="700" fill="#9aa3b8">${tt}</text>`;});
 return `<svg class="fig" viewBox="0 0 ${w} ${h}" style="height:168px">${s}</svg>`;
}

/* ============================ clinical figures (your signals) ============================ */
function cgeo(o){return Object.assign({x0:50,x1:420,y0:30,y1:196,xticks:5,yticks:4},o);}
function cframe(g){
 const X=v=>g.x0+(v-g.xmin)/(g.xmax-g.xmin)*(g.x1-g.x0),Y=v=>g.y1-(v-g.ymin)/(g.ymax-g.ymin)*(g.y1-g.y0);
 let s=`<rect x="${g.x0}" y="${g.y0}" width="${(g.x1-g.x0).toFixed(1)}" height="${(g.y1-g.y0).toFixed(1)}" fill="#fff" stroke="#dbe2ee"/>`;
 const xt=g.xticks,yt=g.yticks;
 for(let i=0;i<=xt;i++){const v=g.xmin+(g.xmax-g.xmin)*i/xt,x=X(v);if(g.grid!==false)s+=`<line x1="${x.toFixed(1)}" y1="${g.y0}" x2="${x.toFixed(1)}" y2="${g.y1}" stroke="#eef2f8"/>`;s+=`<text x="${x.toFixed(1)}" y="${g.y1+14}" fill="#7c879e" font-size="9" text-anchor="middle">${g.xfmt?g.xfmt(v):(+v.toFixed(2))}</text>`;}
 for(let i=0;i<=yt;i++){const v=g.ymin+(g.ymax-g.ymin)*i/yt,y=Y(v);if(g.grid!==false)s+=`<line x1="${g.x0}" y1="${y.toFixed(1)}" x2="${g.x1}" y2="${y.toFixed(1)}" stroke="#eef2f8"/>`;s+=`<text x="${g.x0-6}" y="${(y+3).toFixed(1)}" fill="#7c879e" font-size="9" text-anchor="end">${g.yfmt?g.yfmt(v):(+v.toFixed(2))}</text>`;}
 if(g.title)s+=`<text x="${g.x0}" y="18" fill="#10264f" font-size="12.5" font-weight="800">${esc(g.title)}</text>`;
 if(g.xlabel)s+=`<text x="${((g.x0+g.x1)/2).toFixed(1)}" y="${g.y1+28}" fill="#7c879e" font-size="10" text-anchor="middle">${esc(g.xlabel)}</text>`;
 if(g.ylabel){const my=((g.y0+g.y1)/2).toFixed(1);s+=`<text x="14" y="${my}" fill="#7c879e" font-size="10" text-anchor="middle" transform="rotate(-90 14 ${my})">${esc(g.ylabel)}</text>`;}
 return {s,X,Y};
}
function cborder(g){return `<rect x="${g.x0}" y="${g.y0}" width="${(g.x1-g.x0).toFixed(1)}" height="${(g.y1-g.y0).toFixed(1)}" fill="none" stroke="#dbe2ee"/>`;}
function cpath(d,X,Y,c,w,dash){let p='';for(let i=0;i<d.length;i++)p+=(i?'L':'M')+X(d[i][0]).toFixed(1)+' '+Y(d[i][1]).toFixed(1)+' ';return `<path d="${p}" fill="none" stroke="${c}" stroke-width="${w||1.5}"${dash?` stroke-dasharray="${dash}"`:''} stroke-linejoin="round" stroke-linecap="round"/>`;}
function gss(p,mu,s){return Math.exp(-((p-mu)*(p-mu))/(2*s*s));}
const VIR=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];
function vir(t){t=Math.max(0,Math.min(1,t));const s=t*(VIR.length-1),i=Math.min(Math.floor(s),VIR.length-2),f=s-i,a=VIR[i],b=VIR[i+1];return `rgb(${Math.round(a[0]+(b[0]-a[0])*f)},${Math.round(a[1]+(b[1]-a[1])*f)},${Math.round(a[2]+(b[2]-a[2])*f)})`;}
function svgWrap(inner,cap){return `<svg class="fig" viewBox="0 0 440 244" style="height:188px"><rect width="440" height="244" fill="#fbfdff"/>${inner}${cap?`<text x="50" y="238" fill="#9aa6bd" font-size="9">${esc(cap)}</text>`:''}</svg>`;}

function figECG(){const r=rng(7);const g=cgeo({xmin:0,xmax:4,ymin:-0.5,ymax:1.6,xticks:8,title:'Your ECG · lead I',xlabel:'Time (s)',ylabel:'mV'});const ax=cframe(Object.assign({},g,{grid:false}));
 let bg='';const gl=(a,b,c,d,col,w)=>`<line x1="${a.toFixed(1)}" y1="${b.toFixed(1)}" x2="${c.toFixed(1)}" y2="${d.toFixed(1)}" stroke="${col}" stroke-width="${w}"/>`;
 for(let t=0;t<=4.0001;t+=0.04){const x=ax.X(t);bg+=gl(x,g.y0,x,g.y1,'#fbe2e2',0.5);}for(let v=-0.5;v<=1.6;v+=0.1){const y=ax.Y(v);bg+=gl(g.x0,y,g.x1,y,'#fbe2e2',0.5);}
 for(let t=0;t<=4.0001;t+=0.2){const x=ax.X(t);bg+=gl(x,g.y0,x,g.y1,'#f2b8b8',0.8);}for(let v=-0.5;v<=1.6;v+=0.5){const y=ax.Y(v);bg+=gl(g.x0,y,g.x1,y,'#f2b8b8',0.8);}
 const on=[];let t=0.18;while(t<4){on.push(t);t+=0.82+(r()-0.5)*0.06;}const pts=[],dt=0.008;
 for(let i=0;i*dt<=4;i++){const ts=i*dt;let bi=0;while(on[bi+1]!==undefined&&on[bi+1]<=ts)bi++;const o=on[bi],rr=(on[bi+1]||o+0.8)-o,p=(ts-o)/rr;
  let y=0.12*gss(p,0.18,0.026)-0.10*gss(p,0.31,0.01)+1.22*gss(p,0.345,0.01)-0.30*gss(p,0.38,0.013)+0.28*gss(p,0.6,0.045);y+=(r()-0.5)*0.012;pts.push([ts,y]);}
 const hr=Math.round(60/(on.slice(1).reduce((a,o,i)=>a+(o-on[i]),0)/(on.length-1)));
 const note=`<rect x="${g.x1-86}" y="${g.y0+6}" width="80" height="20" rx="5" fill="#fff" stroke="#e6c4c4"/><text x="${g.x1-46}" y="${g.y0+20}" text-anchor="middle" font-size="11" font-weight="800" fill="#dc4437">${hr} bpm</text>`;
 return svgWrap(ax.s+bg+cpath(pts,ax.X,ax.Y,'#15233f',1.4)+note+cborder(g),'30-second single-lead capture · sinus rhythm');}

function figPoincare(){const r=rng(11);const N=120,rr=[];let c=820;for(let i=0;i<N;i++){c+=(r()-0.5)*60;c=Math.max(660,Math.min(990,c));rr.push(c+Math.sin(i/6)*16);}
 const mn=Math.min.apply(null,rr)-30,mx=Math.max.apply(null,rr)+30;const g=cgeo({xmin:mn,xmax:mx,ymin:mn,ymax:mx,xticks:4,title:'HRV · Poincaré plot',xlabel:'RRn (ms)',ylabel:'RRn+1 (ms)'});const ax=cframe(g);
 let s=`<line x1="${ax.X(mn).toFixed(1)}" y1="${ax.Y(mn).toFixed(1)}" x2="${ax.X(mx).toFixed(1)}" y2="${ax.Y(mx).toFixed(1)}" stroke="#9aa7bd" stroke-dasharray="4 4"/>`;
 const mean=rr.reduce((a,b)=>a+b,0)/N,diff=[],sum=[];for(let i=0;i<N-1;i++){diff.push((rr[i+1]-rr[i])/Math.SQRT2);sum.push((rr[i+1]+rr[i])/Math.SQRT2);}
 const sd=a=>{const m=a.reduce((x,y)=>x+y,0)/a.length;return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/a.length);};const SD1=sd(diff),SD2=sd(sum);
 const cx=ax.X(mean),cy=ax.Y(mean),sc=(ax.X(mx)-ax.X(mn))/(mx-mn);
 s+=`<ellipse cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" rx="${(SD2*sc).toFixed(1)}" ry="${(SD1*sc).toFixed(1)}" fill="rgba(108,92,231,.1)" stroke="#6c5ce7" stroke-width="1.6" transform="rotate(-45 ${cx.toFixed(1)} ${cy.toFixed(1)})"/>`;
 let dots='';for(let i=0;i<N-1;i++)dots+=`<circle cx="${ax.X(rr[i]).toFixed(1)}" cy="${ax.Y(rr[i+1]).toFixed(1)}" r="2" fill="#2f80ed" opacity=".6"/>`;
 const note=`<rect x="${g.x0+8}" y="${g.y0+8}" width="92" height="34" rx="5" fill="#fff" stroke="#dce4f0"/><text x="${g.x0+14}" y="${g.y0+22}" font-size="9.5" fill="#5f6368">SD1 ${SD1.toFixed(0)} ms</text><text x="${g.x0+14}" y="${g.y0+35}" font-size="9.5" fill="#5f6368">SD2 ${SD2.toFixed(0)} ms</text>`;
 return svgWrap(ax.s+s+dots+note+cborder(g),'beat-to-beat variability · parasympathetic tone');}

function figPSD(){const r=rng(13);const g=cgeo({xmin:0,xmax:0.5,ymin:0,ymax:1,xticks:5,title:'HRV power spectrum',xlabel:'Frequency (Hz)',ylabel:'PSD (norm.)'});const ax=cframe(g);
 const band=(a,b,c)=>`<rect x="${ax.X(a).toFixed(1)}" y="${g.y0}" width="${(ax.X(b)-ax.X(a)).toFixed(1)}" height="${g.y1-g.y0}" fill="${c}" opacity=".12"/>`;
 let s=band(0,0.04,'#9aa7bd')+band(0.04,0.15,'#2f80ed')+band(0.15,0.4,'#0f9d58');
 s+=`<text x="${ax.X(0.095).toFixed(1)}" y="${g.y0+12}" font-size="9" fill="#2f80ed" text-anchor="middle" font-weight="700">LF</text><text x="${ax.X(0.27).toFixed(1)}" y="${g.y0+12}" font-size="9" fill="#0f9d58" text-anchor="middle" font-weight="700">HF</text>`;
 const lf=0.09,hf=0.26,Alf=0.78,Ahf=0.62,pts=[];for(let f=0;f<=0.5;f+=0.004){let y=Alf/(1+Math.pow((f-lf)/0.018,2))+Ahf/(1+Math.pow((f-hf)/0.03,2))+0.15/(1+Math.pow((f-0.01)/0.02,2))+0.02;y+=r()*0.012;pts.push([f,Math.min(y,1)]);}
 const note=`<rect x="${g.x1-94}" y="${g.y0+6}" width="88" height="20" rx="5" fill="#fff" stroke="#dce4f0"/><text x="${g.x1-50}" y="${g.y0+20}" text-anchor="middle" font-size="10" font-weight="800" fill="#10264f">LF/HF ${(Alf/Ahf).toFixed(2)}</text>`;
 return svgWrap(ax.s+s+cpath(pts,ax.X,ax.Y,'#15233f',1.6)+note+cborder(g),'Welch periodogram · autonomic balance');}

function figScalogram(){const g=cgeo({x1:392,xmin:0,xmax:8,ymin:0,ymax:1,xticks:4,yticks:6,title:'Time-frequency scalogram',xlabel:'Time (s)',ylabel:'Freq (Hz)'});
 const ax=cframe(Object.assign({},g,{grid:false,yfmt:v=>['0.5','1','2','4','8','16','32'][Math.round(v*6)]}));
 const nx=40,ny=24,cw=(g.x1-g.x0)/nx,ch=(g.y1-g.y0)/ny;let cells='',vmax=1e-6;const G=[];const r=rng(5);
 for(let j=0;j<ny;j++){G[j]=[];for(let i=0;i<nx;i++){const t=i/nx,f=j/ny,ridge=0.25+0.5*t+0.12*Math.sin(t*7);let p=Math.exp(-Math.pow(f-ridge,2)/(2*0.012))*(0.6+0.4*Math.sin(t*9));p+=0.25*Math.exp(-Math.pow(f-0.2,2)/(2*0.02))*Math.max(0,Math.sin(t*5));p+=0.05*r();G[j][i]=p;if(p>vmax)vmax=p;}}
 for(let j=0;j<ny;j++)for(let i=0;i<nx;i++){const x=g.x0+i*cw,y=g.y0+(ny-1-j)*ch;cells+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(cw+0.6).toFixed(1)}" height="${(ch+0.6).toFixed(1)}" fill="${vir(G[j][i]/vmax)}"/>`;}
 const cbid=uid();let st='';for(let i=0;i<=10;i++)st+=`<stop offset="${i*10}%" stop-color="${vir(i/10)}"/>`;
 const cb=`<defs><linearGradient id="${cbid}" x1="0" y1="1" x2="0" y2="0">${st}</linearGradient></defs><rect x="400" y="${g.y0}" width="12" height="${g.y1-g.y0}" fill="url(#${cbid})" stroke="#c9d4e6"/><text x="416" y="${g.y0+8}" font-size="8" fill="#7c879e">hi</text><text x="416" y="${g.y1}" font-size="8" fill="#7c879e">lo</text>`;
 return svgWrap(ax.s+cells+cb+cborder(g),'continuous wavelet transform of pulse signal');}

function figEDA(){const r=rng(17);const g=cgeo({xmin:0,xmax:60,ymin:0,ymax:8,xticks:6,title:'Skin conductance · tonic & phasic',xlabel:'Time (s)',ylabel:'uS'});const ax=cframe(g);
 const ev=[];const n=4;for(let i=0;i<n;i++)ev.push({t:8+r()*44,a:1.4+r()*2});const tonic=t=>2.5+0.8*Math.sin(t/22)+0.0015*t;const scr=t=>{let v=0;ev.forEach(e=>{const d=t-e.t;if(d>0&&d<14)v+=e.a*(Math.exp(-d/3.5)-Math.exp(-d/0.5));});return Math.max(0,v);};
 const tp=[],fp=[];for(let t=0;t<=60;t+=0.25){const to=tonic(t);tp.push([t,to]);fp.push([t,to+scr(t)]);}
 let marks='';ev.forEach(e=>{const x=ax.X(e.t);marks+=`<path d="M${x.toFixed(1)} ${g.y0+4} l-3 -5 l6 0 z" fill="#ff7043"/>`;});
 return svgWrap(ax.s+marks+cpath(tp,ax.X,ax.Y,'#a29bfe',1.6,'5 4')+cpath(fp,ax.X,ax.Y,'#0a7d8c',1.7)+cborder(g),'arousal responses · '+ev.length+' events detected');}

function figResp(){const r=rng(19);const g=cgeo({xmin:0,xmax:30,ymin:-1.2,ymax:1.2,xticks:6,title:'Respiration during sleep',xlabel:'Time (s)',ylabel:'Excursion'});const ax=cframe(g);
 let s=`<rect x="${ax.X(16).toFixed(1)}" y="${g.y0}" width="${(ax.X(22)-ax.X(16)).toFixed(1)}" height="${g.y1-g.y0}" fill="#dc4437" opacity=".07"/><text x="${ax.X(19).toFixed(1)}" y="${g.y0+12}" text-anchor="middle" font-size="8.5" fill="#dc4437" font-weight="700">pause</text>`;
 const pts=[];for(let t=0;t<=30;t+=0.1){const amp=(t>16&&t<22)?0.12:1;pts.push([t,amp*Math.sin(t*2*Math.PI/4)*0.9+(r()-0.5)*0.04]);}
 return svgWrap(ax.s+s+cpath(pts,ax.X,ax.Y,'#2f80ed',1.8)+cborder(g),'breathing waveform · 15 breaths/min');}

function currentTier(){const m=document.body.className.match(/tier-(\d)/);return m?+m[1]:1;}
function hstr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return Math.abs(h);}

/* ---- period (daily / monthly / yearly) ---- */
let PERIOD='month';
function setPeriod(p){PERIOD=p;renderReports();}
function pWord(){return PERIOD==='day'?'Today':PERIOD==='month'?'This month':'This year';}
function pAxis(){return PERIOD==='day'?'Hour':PERIOD==='month'?'Day':'Month';}
function pVs(){return PERIOD==='day'?'vs yest.':PERIOD==='month'?'vs last mo.':'vs last yr';}
function pLen(){return PERIOD==='day'?24:PERIOD==='month'?30:12;}
function periodSeg(){const o=[['day','Daily'],['month','Monthly'],['year','Yearly']];
 return `<div class="period-seg">${o.map(x=>`<button class="${PERIOD===x[0]?'on':''}" onclick="setPeriod('${x[0]}')">${x[1]}</button>`).join('')}</div>`;}

/* ---- highlight callout inside 440x244 figures ---- */
function callout(x,y,text,c){const w=10+text.length*5.3;return `<g><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.6" fill="none" stroke="${c}" stroke-width="2"/><line x1="${x.toFixed(1)}" y1="${(y-4).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(y-17).toFixed(1)}" stroke="${c}" stroke-width="1.2"/><rect x="${(x-2).toFixed(1)}" y="${(y-32).toFixed(1)}" width="${w.toFixed(1)}" height="15" rx="4" fill="${c}"/><text x="${(x+3).toFixed(1)}" y="${(y-21).toFixed(1)}" font-size="9" font-weight="800" fill="#fff">${esc(text)}</text></g>`;}

/* ---- cascade figures (own; reuse cframe toolkit) ---- */
function figControl(){const r=rng(31);const g=cgeo({xmin:0,xmax:60,ymin:-3,ymax:3,xticks:6,title:'Baseline & anomaly windows',xlabel:pAxis(),ylabel:'sigma'});const ax=cframe(g);
 let s=`<rect x="${g.x0}" y="${ax.Y(2).toFixed(1)}" width="${g.x1-g.x0}" height="${(ax.Y(-2)-ax.Y(2)).toFixed(1)}" fill="#0f9d58" opacity=".05"/>`;
 s+=`<line x1="${g.x0}" y1="${ax.Y(0).toFixed(1)}" x2="${g.x1}" y2="${ax.Y(0).toFixed(1)}" stroke="#0f9d58" stroke-width="1.2"/>`;
 [2,-2].forEach(v=>{s+=`<line x1="${g.x0}" y1="${ax.Y(v).toFixed(1)}" x2="${g.x1}" y2="${ax.Y(v).toFixed(1)}" stroke="#dc4437" stroke-dasharray="5 4" stroke-width="1.1"/>`;});
 const pts=[];for(let i=0;i<60;i++){let v=(r()-0.5)*2.2;if(i>40&&i<46)v+=(i-40)*0.7;if(i===22)v=2.6;pts.push([i,Math.max(-3,Math.min(3,v))]);}
 s+=cpath(pts,ax.X,ax.Y,'#5f6b80',1.2);let dots='';pts.forEach(p=>{const o=Math.abs(p[1])>=2;dots+=`<circle cx="${ax.X(p[0]).toFixed(1)}" cy="${ax.Y(p[1]).toFixed(1)}" r="${o?3.2:2}" fill="${o?'#dc4437':'#2f80ed'}"${o?' stroke="#fff" stroke-width="1"':''}/>`;});
 const hl=callout(ax.X(22),ax.Y(2.6),'+2.6 sigma','#dc4437');
 return svgWrap(ax.s+s+dots+hl+cborder(g),'control chart - personal baseline crossings');}

function figBaseline(){const r=rng(41);const g=cgeo({xmin:0,xmax:60,ymin:40,ymax:80,xticks:6,title:'Baseline ribbon & trend',xlabel:pAxis(),ylabel:'value'});const ax=cframe(g);
 const base=58,sd=4;let s=`<rect x="${g.x0}" y="${ax.Y(base+sd).toFixed(1)}" width="${g.x1-g.x0}" height="${(ax.Y(base-sd)-ax.Y(base+sd)).toFixed(1)}" fill="#2f80ed" opacity=".08"/>`;
 s+=`<line x1="${g.x0}" y1="${ax.Y(base).toFixed(1)}" x2="${g.x1}" y2="${ax.Y(base).toFixed(1)}" stroke="#2f80ed" stroke-dasharray="5 4"/>`;
 const pts=[];for(let i=0;i<60;i++){let v=base+Math.sin(i/9)*4+(r()-0.5)*3;pts.push([i,Math.max(40,Math.min(80,v))]);}
 s+=cpath(pts,ax.X,ax.Y,'#15233f',1.4);
 const li=pts.length-1;const hl=callout(ax.X(pts[li][0]),ax.Y(pts[li][1]),'within +/-1 sigma','#2f80ed');
 return svgWrap(ax.s+s+hl+cborder(g),'personal baseline with rolling value');}

function figRegression(){const r=rng(23);const g=cgeo({xmin:0,xmax:10,ymin:0,ymax:10,xticks:5,title:'Response model & residuals',xlabel:'x',ylabel:'y'});const ax=cframe(g);
 const sl=0.7,ic=1.6,pts=[];for(let i=0;i<50;i++){const x=r()*10,y=ic+sl*x+(r()-0.5)*2.4;pts.push([x,Math.max(0,Math.min(10,y))]);}

function figPPG(){const r=rng(29);const g=cgeo({xmin:0,xmax:4,ymin:0,ymax:1.15,xticks:8,title:'Pulse waveform & fiducials',xlabel:'Time (s)',ylabel:'a.u.'});const ax=cframe(g);
 const on=[];let t=0.1;while(t<4){on.push(t);t+=0.85+(r()-0.5)*0.06;}
 const beat=p=>{const sys=Math.exp(-Math.pow(p-0.18,2)/(2*0.0045)),dic=0.45*Math.exp(-Math.pow(p-0.42,2)/(2*0.004)),dec=0.5*Math.exp(-p*2.2);return Math.min(1.05,sys*0.95+dic+dec*0.3);};
 const pts=[],dt=0.006;for(let i=0;i*dt<=4;i++){const ts=i*dt;let bi=0;while(on[bi+1]!==undefined&&on[bi+1]<=ts)bi++;const o=on[bi],rr=(on[bi+1]||o+0.85)-o,p=(ts-o)/rr;pts.push([ts,beat(p)+(r()-0.5)*0.008]);}
 let marks='';on.slice(0,4).forEach(o=>{marks+=`<circle cx="${ax.X(o+0.153).toFixed(1)}" cy="${ax.Y(beat(0.18)).toFixed(1)}" r="3" fill="#dc4437"/><circle cx="${ax.X(o+0.357).toFixed(1)}" cy="${ax.Y(beat(0.42)).toFixed(1)}" r="2.6" fill="#f57c00"/>`;});
 const hl=callout(ax.X(on[0]+0.153),ax.Y(beat(0.18)),'systolic','#dc4437');
 return svgWrap(ax.s+cpath(pts,ax.X,ax.Y,'#0a7d8c',1.7)+marks+hl+cborder(g),'systolic peak + dicrotic notch');}

function figCoherence(){const g=cgeo({x1:392,xmin:0,xmax:8,ymin:0,ymax:1,xticks:4,yticks:6,title:'Wavelet coherence',xlabel:'Time (s)',ylabel:'Freq (Hz)'});
 const ax=cframe(Object.assign({},g,{grid:false,yfmt:v=>['0.5','1','2','4','8','16','32'][Math.round(v*6)]}));
 const nx=32,ny=24,cw=(g.x1-g.x0)/nx,ch=(g.y1-g.y0)/ny;let cells='',arrows='';
 for(let j=0;j<ny;j++)for(let i=0;i<nx;i++){const t=i/nx,f=j/ny;let c=0.5+0.5*Math.sin(t*5+f*8)*Math.cos(f*6-t*3);c=Math.min(1,Math.abs(c)*(0.7+0.5*Math.sin(t*3+1)));
  const x=g.x0+i*cw,y=g.y0+(ny-1-j)*ch;cells+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(cw+0.6).toFixed(1)}" height="${(ch+0.6).toFixed(1)}" fill="${vir(c)}"/>`;

 const hl=callout(g.x0+(g.x1-g.x0)*0.6,g.y0+(g.y1-g.y0)*0.4,'gamma2>0.8','#0b3d2e');

function figDriver(){const labs=['HR','HRV','Sleep','SpO2','Temp','Act'],n=labs.length,r=rng(47);
 const W=300,L=70,T=44,cell=(W-L-10)/n;
 const div=v=>{if(v>=0)return `rgb(${Math.round(255-v*210)},${Math.round(255-v*120)},${Math.round(255-v*40)})`;const a=-v;return `rgb(${Math.round(255-a*40)},${Math.round(255-a*120)},${Math.round(255-a*210)})`;};
 const M=[];let best=0,bi=0,bj=1;for(let i=0;i<n;i++){M[i]=[];for(let j=0;j<n;j++){M[i][j]=i===j?1:(M[j]&&M[j][i]!==undefined?M[j][i]:(r()*1.7-0.7));if(i<j&&Math.abs(M[i][j])>best){best=Math.abs(M[i][j]);bi=i;bj=j;}}}
 let s=`<text x="10" y="18" fill="#10264f" font-size="12.5" font-weight="800">Driver correlation matrix</text>`;
 for(let i=0;i<n;i++)for(let j=0;j<n;j++){const x=L+j*cell,y=T+i*cell;s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(cell-1.5).toFixed(1)}" height="${(cell-1.5).toFixed(1)}" rx="3" fill="${div(M[i][j])}"/><text x="${(x+cell/2).toFixed(1)}" y="${(y+cell/2+3).toFixed(1)}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${Math.abs(M[i][j])>0.6?'#fff':'#5f6b80'}">${M[i][j].toFixed(1)}</text>`;}
 labs.forEach((l,i)=>{s+=`<text x="${L-6}" y="${(T+i*cell+cell/2+3).toFixed(1)}" text-anchor="end" font-size="9" font-weight="700" fill="#5f6b80">${l}</text><text x="${(L+i*cell+cell/2).toFixed(1)}" y="${T-6}" text-anchor="middle" font-size="9" font-weight="700" fill="#5f6b80">${l}</text>`;});
 s+=`<rect x="${(L+bj*cell-1).toFixed(1)}" y="${(T+bi*cell-1).toFixed(1)}" width="${(cell+0.5).toFixed(1)}" height="${(cell+0.5).toFixed(1)}" rx="3" fill="none" stroke="#0b1b3a" stroke-width="2"/>`;

function figStacked(){const r=rng(53);const labs=[['Sleep','#6c5ce7'],['Cardiac','#ff4d6d'],['Activity','#1fd17a']];const W=320,H=178,L=54,T=26,laneH=(H-T-22)/3;

function cascadeViz(c){const out=[],used=new Set();
 (c.families||[]).forEach(f=>{const m=FAMFIG[f.trim()];if(m&&!used.has(m[1])&&out.length<2){used.add(m[1]);out.push({kind:m[1],svg:FIGFN[m[0]]()});}});
 const vt=(c.visuals||[]).join(' ').toLowerCase();
 const add=(kw,fnName,kind)=>{if(vt.indexOf(kw)>=0&&!used.has(kind)&&out.length<2){used.add(kind);out.push({kind,svg:FIGFN[fnName]()});}};
 add('control chart','figControl','control');add('heatmap','figDriver','driver');add('stacked timelines','figStacked','driver');add('scalogram','figScalogram','scalo');add('coherence','figCoherence','coh');

    <div class="rc-chips"><strong>Needs</strong> ${c.inputs.map(x=>`<span class="chip-in">${esc(x)}</span>`).join('')}</div>
    ${t>=2&&c.methods?`<div class="rc-methods"><strong>Method mix —</strong> ${esc(c.methods)}</div>`:''}
    ${t===3&&c.anchors.length?`<div class="rc-anchors"><strong>Evidence —</strong> ${c.anchors.map(a=>esc(a)).join(' · ')}</div>`:''}
   </div>`;}).join('');
 return `<button class="backbtn" onclick="reportsBack()">‹ All profiles</button>
  <div class="card">
   <div class="between"><h2 style="font-size:18px">${esc(p.name.replace(' Profile',''))}</h2><span class="pill info">${layerName(t)}</span></div>
   <p class="sub" style="margin:6px 0 0">${esc(tierSurface(p,t))}</p>
   <div class="hdr-stats"><div><b>${['High','High','Good'][Math.floor(r0()*3)]}</b><span>confidence</span></div><div><b>${(90+Math.floor(r0()*9))}%</b><span>coverage</span></div><div><b>${p.tag?p.families.length*4:p.core+p.premium}</b><span>methods</span></div><div><b>${casc.length}</b><span>reports</span></div></div>
   <div class="gate-row">🔒 ${esc(p.gate)}</div>
   <div class="fam-pills">${p.families.map(f=>`<span class="fam-pill">${esc(f)}</span>`).join('')}</div>
  </div>
  ${periodSeg()}
  ${edge}
  <div class="sec-title"><h3>Final reports · ${esc(pWord())}</h3><a>${casc.length} ready</a></div>
  ${cards}
  ${t<3?`<div class="tierhint">Switch to ${t===1?'Advanced or Clinical':'Clinical'} up top to unlock deeper packages</div>`
       :`<div class="card gate-clin"><div class="between"><h2 style="font-size:15px">Clinician export</h2><span class="badge-tier clin">Clinical</span></div><p class="sub">Source-gated ${esc(pWord().toLowerCase())} packet · raw signals, intervals, provenance & limitations</p><button class="exp-btn">Export ${esc(p.name.replace(' Profile',''))} packet</button></div>`}`;
}
function renderReports(){const el=document.getElementById('scr-reports');if(!el)return;el.innerHTML=reportState.view==='list'?reportsList():reportsDetail(PACK.profiles[reportState.pi]);}
function openProfile(i){reportState={view:'detail',pi:i};renderReports();document.getElementById('screens').scrollTop=0;}
function reportsBack(){reportState={view:'list',pi:reportState.pi};renderReports();document.getElementById('screens').scrollTop=0;}

const screens={today:screenToday,heart:screenHeart,sleep:screenSleep,body:screenBody,trends:screenTrends};
function renderAll(){for(const k in screens){document.getElementById('scr-'+k).innerHTML=screens[k]();}}
renderAll();
renderReports();

document.getElementById('tabbar').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));b.classList.add('on');
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById('scr-'+b.dataset.scr).classList.add('active');
 document.getElementById('screens').scrollTop=0;
 document.getElementById('fab').style.display=(b.dataset.scr==='heart'||b.dataset.scr==='today')?'flex':'none';
});
document.getElementById('segment').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
 document.querySelectorAll('#segment button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 document.body.className='tier-'+b.dataset.tier;
 renderReports();
});
document.getElementById('fab').addEventListener('click',()=>{
 const f=document.getElementById('fab');f.textContent='●●●';f.style.fontSize='14px';
 setTimeout(()=>{f.textContent='+';f.style.fontSize='24px';
  document.querySelector('.tab[data-scr="heart"]').click();},900);
});
</script>
</body>
</html>
